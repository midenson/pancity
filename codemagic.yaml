workflows:
  android-apk:
    name: Android APK Build
    max_build_duration: 60
    environment:
      node: 20
      java: 17
    cache:
      cache_paths:
        - node_modules
    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Build web app
        script: |
          npm run build

      - name: Sync Capacitor
        script: |
          npx cap sync android

      - name: Build Android APK
        script: |
          cd android
          # Fix permission denied error
          chmod +x gradlew
          # Use bash to execute gradlew for extra reliability
          bash ./gradlew assembleDebug

    artifacts:
      - android/app/build/outputs/**/*.apk
